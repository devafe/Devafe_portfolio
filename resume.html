<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — DEVAFE</title>
  <meta name="description" content="Professional resume — view or download.">
  <link rel="icon" href="assets/img/favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/misc.css">
</head>
<body>

  <div id="site-nav"></div>

  <main>
    <section class="container page-hero">
      <p class="eyebrow">// resume</p>
      <h1>Resume</h1>
      <p>View it inline below, or download the PDF directly.</p>
      <div style="margin-top:1.5rem;">
        <a href="assets/files/resume.pdf" download class="btn btn-primary">Download PDF</a>
      </div>
    </section>

    <section class="container section" style="padding-top:1rem;">
      <!-- Once you add assets/files/resume.pdf, this iframe will preview it.
           Until then it'll just show blank/broken — that's expected. -->
      <iframe class="resume-frame" src="assets/files/resume.pdf" title="Resume preview"></iframe>

      <p class="section-sub" style="margin-top:1.5rem;">
        No PDF yet? Put your resume file at <code>assets/files/resume.pdf</code> in your project folder — the download button and preview above will start working automatically.
      </p>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
