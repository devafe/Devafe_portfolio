<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates — DEVAFE Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="nav-logo">DEVAFE Admin</div>
      <a href="dashboard.html" class="admin-nav-link">Overview</a>
      <a href="projects.html" class="admin-nav-link">Projects</a>
      <a href="blog.html" class="admin-nav-link">Blog Posts</a>
      <a href="certificates.html" class="admin-nav-link active">Certificates</a>
      <a href="content.html" class="admin-nav-link">Site Content</a>
      <a href="messages.html" class="admin-nav-link">Messages</a>
      <a href="../index.html" class="admin-nav-link" style="margin-top:1.5rem;border-top:1px solid var(--slate);padding-top:1rem;">&larr; View Live Site</a>
    </aside>

    <div class="admin-main">
      <div class="admin-topbar">
        <div class="admin-topbar-title"><h1>Certificates</h1></div>
        <div class="admin-user">
          <span id="admin-user-email"></span>
          <button id="logout-btn" class="btn btn-ghost" style="padding:0.4rem 0.9rem;font-size:0.8rem;">Log Out</button>
        </div>
      </div>

      <div class="admin-mobile-nav">
        <a href="dashboard.html">Overview</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="certificates.html" class="active">Certificates</a>
        <a href="content.html">Content</a>
        <a href="messages.html">Messages</a>
      </div>

      <div class="admin-content">
        <div class="card">
          <div class="table-toolbar">
            <p class="section-sub" style="margin:0;">Certificates shown on your live Certificates page.</p>
            <button id="add-cert-btn" class="btn btn-primary">+ Add Certificate</button>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead><tr><th>Title</th><th>Issuer</th><th>Date</th><th>Actions</th></tr></thead>
              <tbody id="certs-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="cert-modal">
    <div class="modal-box">
      <h3 id="modal-title">Add Certificate</h3>
      <form id="cert-form">
        <div class="form-group"><label>Title</label><input type="text" id="cf-title" required></div>
        <div class="form-group"><label>Issuer</label><input type="text" id="cf-issuer"></div>
        <div class="form-group"><label>Date Issued</label><input type="date" id="cf-date"></div>
        <div class="form-group"><label>Credential ID</label><input type="text" id="cf-credential"></div>
        <div class="form-group"><label>Verify URL</label><input type="text" id="cf-verify"></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="cf-image"></div>
        <div class="form-group">
          <label><input type="checkbox" id="cf-featured" style="width:auto;display:inline;margin-right:0.5rem;"> Featured on Home page</label>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Certificate</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="assets/auth-guard.js"></script>
  <script src="assets/admin-common.js"></script>
  <script src="assets/certificates-admin.js"></script>
</body>
</html>
