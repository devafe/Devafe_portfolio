<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — DEVAFE</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="login-wrap">
    <form id="login-form" class="card login-card">
      <h1>DEVAFE Admin</h1>
      <p>Sign in to manage your site.</p>

      <div class="form-group">
        <label for="li-email">Email</label>
        <input type="email" id="li-email" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="li-password">Password</label>
        <input type="password" id="li-password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
      <p class="form-status" id="login-status"></p>
    </form>
  </div>

  <script src="../assets/js/supabase-client.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const statusEl = document.getElementById('login-status');

    // Safe auto-redirect if already logged in - wrapped so a broken
    // supabase-client.js can't crash the page before this even loads
    try{
      if(typeof SUPABASE_CONFIGURED !== 'undefined' && SUPABASE_CONFIGURED){
        supabase.auth.getSession().then(({ data: { session } }) => {
          if(session) window.location.href = 'dashboard.html';
        });
      }
    }catch(err){ console.error('Session check failed:', err); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // ALWAYS stop the page reload, no matter what happens next
      statusEl.textContent = '';
      statusEl.className = 'form-status';

      if(typeof SUPABASE_CONFIGURED === 'undefined' || !SUPABASE_CONFIGURED || typeof supabase === 'undefined' || !supabase){
        statusEl.innerHTML = `Supabase isn't connecting. Open <code>assets/js/supabase-client.js</code> and check for typos in the URL/key lines — a common one is extra quote marks (e.g. <code>''https://...''</code> instead of <code>'https://...'</code>).`;
        statusEl.className = 'form-status error';
        return;
      }

      const email = document.getElementById('li-email').value.trim();
      const password = document.getElementById('li-password').value;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try{
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error){
          statusEl.textContent = error.message;
          statusEl.className = 'form-status error';
        } else {
          window.location.href = 'dashboard.html';
        }
      }catch(err){
        statusEl.textContent = 'Unexpected error: ' + err.message;
        statusEl.className = 'form-status error';
      }finally{
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
