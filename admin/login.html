<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — DEVAFE</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="login-wrap">
    <form id="login-form" class="card login-card">
      <h1>DEVAFE Admin</h1>
      <p>Sign in to manage your site.</p>

      <div class="form-group">
        <label for="li-email">Email</label>
        <input type="email" id="li-email" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="li-password">Password</label>
        <input type="password" id="li-password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
      <p class="form-status" id="login-status"></p>
    </form>
  </div>

  <script src="../assets/js/supabase-client.js"></script>
  <script>
    if(!SUPABASE_CONFIGURED){
      document.getElementById('login-form').innerHTML = `
        <p class="form-status error" style="text-align:left;">
          Supabase isn't connected yet. Open <code>assets/js/supabase-client.js</code> and replace
          <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code> with the values from
          your Supabase project (Settings &rarr; API). See README.md for the full setup steps.
        </p>`;
    } else {
      // If already logged in, skip straight to the dashboard
      supabase.auth.getSession().then(({ data: { session } }) => {
        if(session) window.location.href = 'dashboard.html';
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('li-email').value.trim();
        const password = document.getElementById('li-password').value;
        const status = document.getElementById('login-status');
        const btn = e.target.querySelector('button[type="submit"]');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        status.textContent = '';

        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if(error){
          status.textContent = error.message;
          status.className = 'form-status error';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        } else {
          window.location.href = 'dashboard.html';
        }
      });
    }
  </script>
</body>
</html>
