<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts — DEVAFE Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="nav-logo">DEVAFE Admin</div>
      <a href="dashboard.html" class="admin-nav-link">Overview</a>
      <a href="projects.html" class="admin-nav-link">Projects</a>
      <a href="blog.html" class="admin-nav-link active">Blog Posts</a>
      <a href="certificates.html" class="admin-nav-link">Certificates</a>
      <a href="content.html" class="admin-nav-link">Site Content</a>
      <a href="messages.html" class="admin-nav-link">Messages</a>
      <a href="../index.html" class="admin-nav-link" style="margin-top:1.5rem;border-top:1px solid var(--slate);padding-top:1rem;">&larr; View Live Site</a>
    </aside>

    <div class="admin-main">
      <div class="admin-topbar">
        <div class="admin-topbar-title"><h1>Blog Posts</h1></div>
        <div class="admin-user">
          <span id="admin-user-email"></span>
          <button id="logout-btn" class="btn btn-ghost" style="padding:0.4rem 0.9rem;font-size:0.8rem;">Log Out</button>
        </div>
      </div>

      <div class="admin-mobile-nav">
        <a href="dashboard.html">Overview</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="certificates.html">Certificates</a>
        <a href="content.html">Content</a>
        <a href="messages.html">Messages</a>
      </div>

      <div class="admin-content">
        <div class="card">
          <div class="table-toolbar">
            <p class="section-sub" style="margin:0;">Posts shown on your live Blog page. Content supports Markdown.</p>
            <button id="add-post-btn" class="btn btn-primary">+ New Post</button>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead><tr><th>Title</th><th>Category</th><th>Published</th><th>Actions</th></tr></thead>
              <tbody id="posts-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="post-modal">
    <div class="modal-box">
      <h3 id="modal-title">New Post</h3>
      <form id="post-form">
        <div class="form-group"><label>Title</label><input type="text" id="bf-title" required></div>
        <div class="form-group"><label>Slug (used in the URL, auto-filled from title)</label><input type="text" id="bf-slug" placeholder="auto-generated"></div>
        <div class="form-group">
          <label>Category</label>
          <select id="bf-category" class="search-input">
            <option>Data Science</option><option>Machine Learning</option><option>Web Development</option>
            <option>Tutorials</option><option>Notes</option>
          </select>
        </div>
        <div class="form-group"><label>Excerpt (shown in the post list)</label><input type="text" id="bf-excerpt"></div>
        <div class="form-group"><label>Reading time (minutes)</label><input type="number" id="bf-reading-time" min="1" value="5"></div>
        <div class="form-group"><label>Content (Markdown supported)</label><textarea id="bf-content" style="min-height:220px;font-family:var(--font-mono);font-size:0.85rem;"></textarea></div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Post</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="assets/auth-guard.js"></script>
  <script src="assets/admin-common.js"></script>
  <script src="assets/blog-admin.js"></script>
</body>
</html>
