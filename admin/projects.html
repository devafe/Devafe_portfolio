<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — DEVAFE Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="nav-logo">DEVAFE Admin</div>
      <a href="dashboard.html" class="admin-nav-link">Overview</a>
      <a href="projects.html" class="admin-nav-link active">Projects</a>
      <a href="blog.html" class="admin-nav-link">Blog Posts</a>
      <a href="certificates.html" class="admin-nav-link">Certificates</a>
      <a href="content.html" class="admin-nav-link">Site Content</a>
      <a href="messages.html" class="admin-nav-link">Messages</a>
      <a href="../index.html" class="admin-nav-link" style="margin-top:1.5rem;border-top:1px solid var(--slate);padding-top:1rem;">&larr; View Live Site</a>
    </aside>

    <div class="admin-main">
      <div class="admin-topbar">
        <div class="admin-topbar-title"><h1>Projects</h1></div>
        <div class="admin-user">
          <span id="admin-user-email"></span>
          <button id="logout-btn" class="btn btn-ghost" style="padding:0.4rem 0.9rem;font-size:0.8rem;">Log Out</button>
        </div>
      </div>

      <div class="admin-mobile-nav">
        <a href="dashboard.html">Overview</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="certificates.html">Certificates</a>
        <a href="content.html">Content</a>
        <a href="messages.html">Messages</a>
      </div>

      <div class="admin-content">
        <div class="card">
          <div class="table-toolbar">
            <p class="section-sub" style="margin:0;">All projects shown on your live Projects page.</p>
            <button id="add-project-btn" class="btn btn-primary">+ Add Project</button>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr><th>Title</th><th>Category</th><th>Added</th><th>Actions</th></tr>
              </thead>
              <tbody id="projects-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal-box">
      <h3 id="modal-title">Add Project</h3>
      <form id="project-form">
        <div class="form-group"><label>Title</label><input type="text" id="pf-title" required></div>
        <div class="form-group"><label>Summary (short, shown in cards)</label><input type="text" id="pf-summary"></div>
        <div class="form-group">
          <label>Category</label>
          <select id="pf-category" class="search-input">
            <option>Data Science</option><option>Machine Learning</option><option>Artificial Intelligence</option>
            <option>Python</option><option>Data Analysis</option><option>Web Development</option>
            <option>Automation</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Tags (comma-separated)</label><input type="text" id="pf-tags" placeholder="Python, Pandas, ML"></div>
        <div class="form-group"><label>GitHub URL</label><input type="text" id="pf-github"></div>
        <div class="form-group"><label>Live Demo URL</label><input type="text" id="pf-live"></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="pf-image" placeholder="https://..."></div>
        <div class="form-group"><label>Problem</label><textarea id="pf-problem"></textarea></div>
        <div class="form-group"><label>Solution</label><textarea id="pf-solution"></textarea></div>
        <div class="form-group"><label>Features (one per line)</label><textarea id="pf-features"></textarea></div>
        <div class="form-group"><label>Technologies (comma-separated)</label><input type="text" id="pf-tech"></div>
        <div class="form-group"><label>Lessons Learned</label><textarea id="pf-lessons"></textarea></div>
        <div class="form-group"><label>Future Improvements</label><textarea id="pf-future"></textarea></div>
        <div class="form-group">
          <label><input type="checkbox" id="pf-featured" style="width:auto;display:inline;margin-right:0.5rem;"> Featured on Home page</label>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../assets/js/supabase-client.js"></script>
  <script src="assets/auth-guard.js"></script>
  <script src="assets/projects-admin.js"></script>
</body>
</html>
